<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sistem de Recuperare Conturi</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #console {
            width: 80%;
            max-width: 600px;
            background: #050505;
            padding: 20px;
            border: 1px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            height: 300px;
            overflow-y: hidden;
            position: relative;
        }
        .line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
        .progress-bar {
            width: 0%;
            height: 20px;
            background-color: #0f0;
            margin-top: 20px;
            transition: width 0.5s;
        }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h2>TERMINAL ACCES SERVER #ROBLOX-772</h2>
    <div id="console"></div>
    <div id="progress-container" style="width: 80%; max-width: 600px; border: 1px solid #0f0; margin-top: 10px; display: none;">
        <div id="bar" class="progress-bar"></div>
    </div>

    <script>
        const logs = [
            "> Initializing exploit...",
            "> Connecting to Roblox API via Proxy 192.168.1.1...",
            "> Connection established.",
            "> Finding user session...",
            "> TARGET FOUND: [Current_User_Session]",
            "> Bypassing 2FA...",
            "> Accessing database...",
            "> Extracting credentials...",
            "> [ERROR] Encryption key required.",
            "> Attempting brute force...",
            "> 10% completed...",
            "> 45% completed...",
            "> 89% completed...",
            "> ACCESS GRANTED."
        ];

        let i = 0;
        const consoleDiv = document.getElementById('console');

        function printLog() {
            if (i < logs.length) {
                let p = document.createElement('p');
                p.className = 'line';
                p.innerHTML = logs[i];
                consoleDiv.appendChild(p);
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
                i++;
                setTimeout(printLog, 800);
            } else {
                showFinalMessage();
            }
        }

        function showFinalMessage() {
            document.getElementById('progress-container').style.display = 'block';
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.body.innerHTML = "<h1 class='error'>CONTUL TAU A FOST HACK-UIT!</h1><p>Toate datele au fost trimise catre serverul central.</p><button onclick='location.reload()' style='padding:10px; background:#0f0; border:none; cursor:pointer;'>Inchide Sesiunea</button>";
                } else {
                    width++;
                    document.getElementById('bar').style.width = width + '%';
                }
            }, 50);
        }

        setTimeout(printLog, 1000);
    </script>
</body>
</html>
